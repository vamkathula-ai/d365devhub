name: 🤖 Auto-Generate D365 Lesson

on:
  schedule:
    - cron: '0 3 */2 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-lesson:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install anthropic requests

      - name: 🤖 Generate new lesson
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_lesson.py

      - name: ✅ Check if lesson was generated
        id: check
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new content generated"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New lesson generated!"
          fi

      - name: 📤 Commit and push new lesson
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "D365DevHub Bot"
          git config user.email "bot@d365devhub.com"
          git add site/data/
          git stash --include-untracked || true
          git fetch origin main
          git reset --soft origin/main || true
          git add site/data/
          LESSON_TITLE=$(cat site/data/latest_lesson_title.txt 2>/dev/null || echo "New Lesson")
          git commit -m "🤖 Auto-lesson: ${LESSON_TITLE} [$(date '+%d %b %Y')]" || echo "Nothing to commit"
          git push origin main

      - name: 🎉 Summary
        run: |
          echo "## Automation Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Date: $(date '+%d %b %Y %H:%M IST')" >> $GITHUB_STEP_SUMMARY
          TITLE=$(cat site/data/latest_lesson_title.txt 2>/dev/null || echo "Unknown")
          echo "- Lesson: ${TITLE}" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(python3 -c "import json; print(len(json.load(open('site/data/lessons.json'))))" 2>/dev/null || echo "?")
          echo "- Total lessons on site: ${TOTAL}" >> $GITHUB_STEP_SUMMARY
